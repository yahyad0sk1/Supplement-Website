<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="catalog.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../Font Awesome/css/all.css">

    <title>supplements store</title>
    <link rel="icon" type="image/x-icon" href="../images/logo.jpg">
</head>
<body>

    <header>
        <a href="../index.html"><i class="fa-solid fa-arrow-left"></i></a>
        <div class="filter-container">
            <div class="filter-mobile-head" onclick="toggleFilter()">
                <span id="current-category">All Categories</span>
                <span class="arrow">▼</span>
            </div>

            <ul class="filter-list" id="filterMenu">
                <li class="active-filter">
                    <a onclick="filterItems('all', this.parentElement)" href="javascript:void(0)">All</a>
                </li>
                <li>
                    <a onclick="filterItems('protein', this.parentElement)" href="javascript:void(0)">Proteins</a>
                </li>
                <li>
                    <a onclick="filterItems('creatine', this.parentElement)" href="javascript:void(0)">Creatine</a>
                </li>
                <li>
                    <a onclick="filterItems('preworkout', this.parentElement)" href="javascript:void(0)">Pre-Workout</a>
                </li>
                <li>
                    <a onclick="filterItems('vitamin', this.parentElement)" href="javascript:void(0)">Vitamins</a>
                </li>
                <li>
                    <a onclick="filterItems('other', this.parentElement)" href="javascript:void(0)">Other</a>
                </li>
            </ul>
        </div>
    </header>

    <!-- Cart -->
    <div class="cart-btn-container" onclick="openCart()">
        <div class="cart-circle">
            <i class="fa-solid fa-basket-shopping"></i>
            <span id="cart-count">0</span>
        </div>
    </div>

    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h3>Your Basket</h3>
            <i class="fa-solid fa-xmark" onclick="closeCart()"></i>
        </div>
        
        <div id="cart-items-container">
            </div>

        <div class="cart-footer">
            <div class="total-price">
                <span>Total:</span>
                <span id="total-amount">$0.00</span>
            </div>
            <button class="order-now-btn" onclick="goToCheckout()">Order Now</button>
        </div>
    </div>

<div class="card-list" id="catalog-grid">
    </div>

    <script src="../cart.js"></script>
    <script src="catalog.js"></script>
</body>
</html>
